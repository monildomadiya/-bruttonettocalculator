name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            mkdir -p /var/www/bruttonetto
            cd /var/www/bruttonetto
            if [ ! -d ".git" ]; then
              echo "Git repo not found. Cloning..."
              git clone https://github.com/monildomadiya/-bruttonettocalculator.git .
            else
              echo "Pulling latest changes..."
              git fetch origin
              git reset --hard origin/main
            fi
            cat > .env << 'ENVEOF'
DB_HOST="localhost"
DB_PORT="3306"
DB_USER="${{ secrets.DB_USER }}"
DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
DB_NAME="bruttonetto_db"
CLOUDINARY_CLOUD_NAME="${{ secrets.CLOUDINARY_CLOUD_NAME }}"
CLOUDINARY_API_KEY="${{ secrets.CLOUDINARY_API_KEY }}"
CLOUDINARY_API_SECRET="${{ secrets.CLOUDINARY_API_SECRET }}"
CLOUDINARY_URL="${{ secrets.CLOUDINARY_URL }}"
ENVEOF
            npm install
            npm run build
            pm2 delete bruttonetto_live || true
            fuser -k 3007/tcp || true
            PORT=3007 pm2 start npm --name "bruttonetto_live" --cwd /var/www/bruttonetto -- run start
            pm2 save
            sleep 5
            pm2 status
            pm2 logs bruttonetto_live --lines 30 --nostream