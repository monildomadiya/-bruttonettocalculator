name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            mkdir -p /var/www/bruttonetto
            cd /var/www/bruttonetto
            if [ ! -d ".git" ]; then
              echo "Git repo not found. Cloning..."
              git clone https://github.com/monildomadiya/-bruttonettocalculator.git .
            else
              echo "Pulling latest changes..."
              git fetch origin
              git reset --hard origin/main
            fi
            npm install
            npm run build
            pm2 delete bruttonetto_live || true
            fuser -k 3007/tcp || true
            PORT=3007 pm2 start npm --name "bruttonetto_live" -- run start
            pm2 save