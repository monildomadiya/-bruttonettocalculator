name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main  # જો તમારી મેઈન બ્રાન્ચનું નામ master હોય, તો અહી master લખવું.

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            mkdir -p /var/www/bruttonetto
            cd /var/www/bruttonetto
            if [ ! -d ".git" ]; then
              echo "Git repo not found. Cloning..."
              git clone https://github.com/monildomadiya/-bruttonettocalculator.git .
            else
              echo "Pulling latest changes..."
              git reset --hard
              git pull origin main
            fi
            npm install
            npm run build
            pm2 restart bruttonetto_live || pm2 start npm --name "bruttonetto_live" -- run start
            pm2 save